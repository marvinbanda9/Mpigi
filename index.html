<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Links</title>

<style>
body {
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: #f4f4f4;
}

.container {
    text-align: center;
}

a.button {
    display: inline-block;
    margin: 10px;
    padding: 12px 20px;
    background: #007bff;
    color: white;
    text-decoration: none;
    border-radius: 6px;
    font-size: 16px;
    transition: 0.2s;
}

a.button:hover {
    background: #0056b3;
}
</style>
</head>

<body>

<div class="container">
    <a class="button" href="sample1.html">Sample One</a>
    <a class="button" href="https://mpigi2.onrender.com/">Sample Two</a>
</div>

</body>
</html>
