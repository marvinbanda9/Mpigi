<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Website Sample Showcase</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;

    background: linear-gradient(180deg, #001428, #003b73, #001428);
    color: white;
}

/* ===== Container ===== */
.container {
    position: relative;
    text-align: center;
    padding: 35px;
    border-radius: 18px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    box-shadow: 0 10px 35px rgba(0,0,0,0.5);
    max-width: 600px;
    z-index: 2;
}

h1 {
    margin-bottom: 8px;
}

p {
    opacity: 0.85;
    font-size: 14px;
    margin-bottom: 20px;
    line-height: 1.5;
}

/* ===== Cards ===== */
.cards {
    display: flex;
    gap: 15px;
    justify-content: center;
    flex-wrap: wrap;
}

.card {
    width: 220px;
    padding: 15px;
    border-radius: 14px;
    background: rgba(255,255,255,0.10);
    box-shadow: 0 6px 18px rgba(0,0,0,0.3);
    text-decoration: none;
    color: white;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-6px);
    background: rgba(0,180,255,0.15);
}

.preview {
    height: 110px;
    border-radius: 10px;
    background: linear-gradient(135deg, #00b4ff, #0057ff);
    margin-bottom: 10px;
}

/* ===== Bubbles (static realistic) ===== */
.bubbles {
    position: absolute;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
    z-index: 1;
}

.bubble {
    position: absolute;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.18);
    border: 1px solid rgba(255, 255, 255, 0.25);
    box-shadow: inset 0 0 8px rgba(255,255,255,0.2);
    backdrop-filter: blur(2px);
}

/* bubble placements */
.b1 { width: 80px; height: 80px; top: 15%; left: 10%; }
.b2 { width: 40px; height: 40px; top: 70%; left: 20%; }
.b3 { width: 60px; height: 60px; top: 30%; left: 75%; }
.b4 { width: 25px; height: 25px; top: 60%; left: 55%; }
.b5 { width: 50px; height: 50px; top: 80%; left: 80%; }
.b6 { width: 35px; height: 35px; top: 20%; left: 45%; }


/* ===== Wave ===== */
.wave {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 200%;
    height: 120px;
    background: url("https://svgshare.com/i/12V8.svg");
    background-size: 50% 100%;
    opacity: 0.4;
}

/* ===== Container layering fix ===== */
.container {
    position: relative;
    z-index: 2;
}
</style>
</head>

<body>

<!-- Bubbles -->
<div class="bubbles">
    <div class="bubble b1"></div>
    <div class="bubble b2"></div>
    <div class="bubble b3"></div>
    <div class="bubble b4"></div>
    <div class="bubble b5"></div>
    <div class="bubble b6"></div>
</div>



<!-- Main content -->
<div class="container">
    <h1>Website Sample Showcase</h1>
    <p>
        This page demonstrates two sample websites for preview purposes.  
        Click any card below to open and explore each design.
    </p>

    <div class="cards">
        <a class="card" href="sample1.html">
            <div class="preview"></div>
            <strong>Sample One</strong>
            <p>Local demo website layout</p>
        </a>

        <a class="card" href="https://mpigimedcare2.onrender.com/">
            <div class="preview"></div>
            <strong>Sample Two</strong>
            <p>Live deployed website</p>
        </a>
    </div>
</div>

<!-- Wave -->
<div class="wave"></div>

</body>
</html>
